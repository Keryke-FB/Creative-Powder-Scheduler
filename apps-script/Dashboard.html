<!doctype html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --ink: #18201d;
        --muted: #65706b;
        --line: #d8ded9;
        --panel: rgba(255, 255, 255, 0.86);
        --paper: #f5f7f2;
        --green: #1f6b4a;
        --green-2: #dceadd;
        --blue: #215a7a;
        --hot: #b83a2e;
        --amber: #c07b24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Aptos", "Segoe UI", sans-serif;
        background:
          linear-gradient(135deg, rgba(31, 107, 74, 0.12), transparent 36%),
          linear-gradient(315deg, rgba(33, 90, 122, 0.12), transparent 42%),
          var(--paper);
      }

      button, select {
        font: inherit;
      }

      .shell {
        width: min(1480px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 0 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 240px;
      }

      .mark {
        width: 66px;
        height: 66px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        background: #050505;
        overflow: hidden;
      }

      .mark img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.1;
      }

      .subtitle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .connection {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin-top: 8px;
        min-height: 26px;
        padding: 0 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 12px;
      }

      .connection::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--amber);
      }

      .connection.connected::before {
        background: var(--green);
      }

      .connection.disconnected {
        border-color: #f0d4a8;
        background: #fff7ea;
        color: #7a4a0c;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .menuWrap {
        position: relative;
      }

      .btn {
        border: 1px solid var(--green);
        background: var(--green);
        color: #fff;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 6px;
        cursor: pointer;
      }

      .btn.secondary {
        border-color: var(--line);
        color: var(--ink);
        background: rgba(255, 255, 255, 0.8);
      }

      .btn.shop {
        border-color: var(--blue);
        background: var(--blue);
      }

      .btn.danger {
        border-color: #9f241c;
        background: #b83a2e;
        color: #fff;
      }

      .btn:disabled {
        opacity: 0.58;
        cursor: progress;
      }

      .menu {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        min-width: 220px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 16px 40px rgba(24, 32, 29, 0.14);
        display: none;
        z-index: 5;
      }

      .menu.open {
        display: block;
      }

      .menuItem {
        display: block;
        width: 100%;
        min-height: 36px;
        line-height: 36px;
        padding: 0 10px;
        border: 0;
        border-radius: 6px;
        text-align: left;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        text-decoration: none;
      }

      .menuItem:hover {
        background: #eef2ef;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(5, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .stat {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .stat strong {
        display: block;
        margin-top: 8px;
        font-size: 24px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-bottom: 0;
        border-radius: 8px 8px 0 0;
        background: rgba(255, 255, 255, 0.72);
      }

      .tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .tab {
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        min-height: 32px;
        padding: 0 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      .tab.active {
        color: var(--green);
        border-color: var(--green-2);
        background: var(--green-2);
      }

      .search {
        min-height: 34px;
        width: min(320px, 100%);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        background: #fff;
      }

      .tableWrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 0 0 8px 8px;
        background: var(--panel);
      }

      table {
        width: 100%;
        min-width: 1080px;
        border-collapse: collapse;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        font-size: 12px;
        color: var(--muted);
        background: #f7faf6;
        border-bottom: 1px solid var(--line);
        padding: 0;
      }

      .headBtn {
        width: 100%;
        min-height: 42px;
        padding: 10px;
        border: 0;
        background: transparent;
        color: inherit;
        text-align: left;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .headBtn[data-active="true"] {
        color: var(--green);
      }

      .headStatic {
        display: block;
        min-height: 42px;
        padding: 10px;
        font-weight: 700;
      }

      .sortMark {
        display: inline-block;
        min-width: 14px;
        margin-left: 6px;
        color: var(--muted);
      }

      td {
        border-bottom: 1px solid var(--line);
        padding: 8px 10px;
        vertical-align: middle;
        font-size: 14px;
      }

      tr.hot td:first-child {
        border-left: 4px solid var(--hot);
      }

      tr.tomorrow td:first-child {
        border-left: 4px solid var(--green);
      }

      tr.review {
        background: rgba(192, 123, 36, 0.08);
      }

      .status {
        min-width: 138px;
        border: 1px solid var(--line);
        border-radius: 6px;
        min-height: 32px;
        padding: 0 8px;
        background: #fff;
      }

      .cellText {
        display: block;
        min-width: 92px;
        min-height: 32px;
        line-height: 32px;
        padding: 0 8px;
      }

      .rowActions {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .iconBtn {
        border: 1px solid var(--line);
        border-radius: 6px;
        min-width: 32px;
        min-height: 32px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      .iconBtn.primary {
        border-color: var(--green);
        color: #fff;
        background: var(--green);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 12px;
        background: #eef2ef;
        color: var(--muted);
      }

      .pill.hot {
        background: #f7ded9;
        color: var(--hot);
      }

      .pill.review {
        background: #f6e7cf;
        color: #7a4a0c;
      }

      .empty {
        padding: 42px 16px;
        text-align: center;
        color: var(--muted);
      }

      .toast {
        min-height: 22px;
        color: var(--muted);
        font-size: 13px;
      }

      .hideActions th:last-child,
      .hideActions td:last-child {
        display: none;
      }

      .printOverlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        background: rgba(24, 32, 29, 0.42);
        padding: 24px;
        overflow: auto;
      }

      .printOverlay.open {
        display: block;
      }

      .printShell {
        width: min(980px, 100%);
        margin: 0 auto;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 80px rgba(24, 32, 29, 0.22);
      }

      .printToolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
        background: #f7faf6;
      }

      .printPage {
        padding: 24px;
      }

      .printHead {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        border-bottom: 2px solid var(--ink);
        padding-bottom: 14px;
        margin-bottom: 16px;
      }

      .printTitle {
        margin: 0;
        font-size: 24px;
      }

      .printMeta {
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      .colorGroup {
        break-inside: avoid;
        margin-top: 18px;
      }

      .colorHeader {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        background: var(--green-2);
        font-weight: 800;
      }

      .printRows {
        width: 100%;
        min-width: 0;
        table-layout: fixed;
        border: 1px solid var(--line);
        border-top: 0;
      }

      .printRows th,
      .printRows td {
        position: static;
        padding: 8px 10px;
        font-size: 13px;
        background: #fff;
        overflow-wrap: anywhere;
        word-break: normal;
      }

      .printRows th {
        color: var(--muted);
        background: #fbfcfa;
      }

      .printRows tr.hotPrint td:first-child {
        color: var(--hot);
        font-weight: 800;
      }

      .printRows tr.hotPrint td:nth-child(2) {
        color: var(--hot);
        font-weight: 800;
      }

      .printRows col.paint { width: 24%; }
      .printRows col.hot { width: 9%; }
      .printRows col.customer { width: 31%; }
      .printRows col.part { width: 24%; }
      .printRows col.qty { width: 12%; }

      @media (max-width: 760px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions {
          justify-content: flex-start;
        }

        .stats {
          grid-template-columns: repeat(2, 1fr);
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }
      }

      @media print {
        body {
          background: #fff;
        }

        .shell {
          display: none;
        }

        .printOverlay,
        .printOverlay.open {
          position: static;
          display: block;
          padding: 0;
          background: #fff;
        }

        .printShell {
          width: 100%;
          border: 0;
          box-shadow: none;
        }

        .printToolbar {
          display: none;
        }

        .printPage {
          padding: 0;
        }
      }
    </style>
  </head>

    <script>
      const state = {
        rows: [],
        filter: 'all',
        search: '',
        busy: false,
        sortKey: 'customer',
        sortDir: 'asc'
      };

      const demoState = {
        masterUrl: '#',
        floorUrl: '#',
        readerStatus: { reader: 'Gemini Vision', model: 'gemini-2.5-flash' },
        counts: { total: 4, hot: 1, tomorrow: 1, hold: 2, review: 1 },
        rows: [
          {
            rowNumber: 2,
            status: 'Hot List',
            customer: 'T & W Stamping',
            partNumber: '24228737-P',
            quantity: '64',
            powder: 'YN1117 MED GL BLK',
            dateReceived: '4/23/2026',
            dueDate: '5/3/2026',
            maskedStatus: 'Masked',
            reviewStatus: '',
            sourcePhoto: 'IMG_4067.JPG',
            sourcePhotoUrl: 'https://drive.google.com'
          },
          {
            rowNumber: 3,
            status: 'On Hold',
            customer: 'MEC',
            partNumber: '220-65785',
            quantity: '90',
            powder: 'YN1117 MED GL BLK',
            dateReceived: '4/22/2026',
            dueDate: '5/2/2026',
            maskedStatus: '',
            reviewStatus: 'Needs Review',
            sourcePhoto: 'IMG_4068.JPG',
            sourcePhotoUrl: 'https://drive.google.com'
          },
          {
            rowNumber: 4,
            status: 'Run Tomorrow',
            customer: 'GB MANUFACTURING',
            partNumber: '24508198',
            quantity: '450',
            powder: 'YN1117 MED GL BLK',
            dateReceived: '4/27/2026',
            dueDate: '5/7/2026',
            maskedStatus: '',
            reviewStatus: '',
            sourcePhoto: 'IMG_4069.JPG',
            sourcePhotoUrl: 'https://drive.google.com'
          },
          {
            rowNumber: 5,
            status: 'On Hold',
            customer: 'GB MANUFACTURING',
            partNumber: '24707233',
            quantity: '128',
            powder: 'YN1117 MED GL BLACK',
            dateReceived: '5/6/2026',
            dueDate: '5/16/2026',
            maskedStatus: 'Masked',
            reviewStatus: '',
            sourcePhoto: 'IMG_4070.JPG',
            sourcePhotoUrl: 'https://drive.google.com'
          }
        ]
      };

      const $ = (selector) => document.querySelector(selector);
      const rowsEl = $('#rows');
      const emptyEl = $('#empty');
      const toastEl = $('#toast');
      const importReportsBtn = $('#importReportsBtn');
      const digestBtn = $('#digestBtn');
      const toolsBtn = $('#toolsBtn');
      const toolsMenu = $('#toolsMenu');
      const repairBtn = $('#repairBtn');
      const shopBtn = $('#shopBtn');
      const finalizeBtn = $('#finalizeBtn');
      const setupBtn = $('#setupBtn');
      const refreshBtn = $('#refreshBtn');
      const sheetLink = $('#sheetLink');
      const printOverlay = $('#printOverlay');
      const printPage = $('#printPage');
      const connectionBadge = $('#connectionBadge');
      const readerBadge = $('#readerBadge');

      function backend() {
        return window.google && google.script && google.script.run;
      }

      function callServer(name, ...args) {
        if (!backend()) {
          return Promise.resolve(mockServer(name, ...args));
        }
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)[name](...args);
        });
      }

      function mockServer(name, ...args) {
        if (name === 'getDashboardState') return demoState;
        if (name === 'updateScheduleStatus') {
          const [rowNumber, status] = args;
          const row = demoState.rows.find(item => String(item.rowNumber) === String(rowNumber));
          if (row) row.status = status;
          demoState.counts = buildClientCounts(demoState.rows);
          return demoState;
        }
        if (name === 'updateTravelerRow') {
          const [rowNumber, patch] = args;
          const row = demoState.rows.find(item => String(item.rowNumber) === String(rowNumber));
          if (row) Object.assign(row, patch || {});
          demoState.counts = buildClientCounts(demoState.rows);
          return demoState;
        }
        if (name === 'markReviewed') {
          const [rowNumber] = args;
          const row = demoState.rows.find(item => String(item.rowNumber) === String(rowNumber));
          if (row) row.reviewStatus = '';
          demoState.counts = buildClientCounts(demoState.rows);
          return demoState;
        }
        if (name === 'completeSendToShop') {
          const shopRows = sortClientShopRows(demoState.rows.filter(row => row.status === 'Run Tomorrow' || row.status === 'Hot List'));
          return {
            batchId: 'preview-shop-batch',
            timestamp: new Date().toLocaleString(),
            sentCount: shopRows.length,
            shopRows,
            floorUrl: demoState.masterUrl,
            state: demoState
          };
        }
        if (name === 'previewShopSchedule') {
          const shopRows = sortClientShopRows(demoState.rows.filter(row => row.status === 'Run Tomorrow' || row.status === 'Hot List'));
          return {
            batchId: 'preview-shop-batch',
            timestamp: new Date().toLocaleString(),
            sentCount: shopRows.length,
            shopRows,
            floorUrl: demoState.masterUrl,
            state: demoState
          };
        }
        if (name === 'digestPhotosNow') {
          return { state: demoState, appended: [], failed: [{ name: 'Preview mode', error: 'Deploy the Apps Script web app to digest Drive photos.' }] };
        }
        if (name === 'importOpenOrderReports') {
          return { state: demoState, imported: [], skipped: [], failed: [{ name: 'Preview mode', error: 'Deploy the Apps Script web app to import Drive reports.' }] };
        }
        if (name === 'repairNeedsReview') {
          return { state: demoState, repaired: [], failed: [{ rowNumber: 0, error: 'Deploy the Apps Script web app to repair rows.' }] };
        }
        if (name === 'installTriggers') {
          return 'Preview mode cannot install auto import. Open the deployed Apps Script web app.';
        }
        return demoState;
      }

      function buildClientCounts(rows) {
        return rows.reduce((counts, row) => {
          counts.total += 1;
          if (row.status === 'Hot List') counts.hot += 1;
          if (row.status === 'Run Tomorrow') counts.tomorrow += 1;
          if (row.status === 'On Hold') counts.hold += 1;
          if (row.reviewStatus) counts.review += 1;
          return counts;
        }, { total: 0, hot: 0, tomorrow: 0, hold: 0, review: 0 });
      }

      function sortClientShopRows(rows) {
        return rows.slice().sort((a, b) => {
          const colorCompare = String(a.powder || '').localeCompare(String(b.powder || ''), undefined, { sensitivity: 'base', numeric: true });
          if (colorCompare) return colorCompare;
          const hotCompare = Number(b.status === 'Hot List') - Number(a.status === 'Hot List');
          if (hotCompare) return hotCompare;
          const customerCompare = String(a.customer || '').localeCompare(String(b.customer || ''), undefined, { sensitivity: 'base', numeric: true });
          if (customerCompare) return customerCompare;
          return String(a.partNumber || '').localeCompare(String(b.partNumber || ''), undefined, { sensitivity: 'base', numeric: true });
        });
      }

      function sortRows(rows) {
        const key = state.sortKey;
        const dir = state.sortDir === 'desc' ? -1 : 1;
        const statusRank = { 'Hot List': 0, 'Run Tomorrow': 1, 'On Hold': 2 };
        const parseDateValue = value => {
          const parsed = Date.parse(String(value || '').replace(/-/g, ' '));
          return Number.isNaN(parsed) ? null : parsed;
        };
        return rows.slice().sort((a, b) => {
          if (key === 'status') {
            return ((statusRank[a.status] ?? 99) - (statusRank[b.status] ?? 99)) * dir;
          }
          if (key === 'quantity') {
            const aNumber = Number(String(a[key] || '').replace(/[^0-9.-]/g, '')) || 0;
            const bNumber = Number(String(b[key] || '').replace(/[^0-9.-]/g, '')) || 0;
            if (aNumber !== bNumber) return (aNumber - bNumber) * dir;
          }
          if (key === 'reviewStatus') {
            return (Number(Boolean(a.reviewStatus)) - Number(Boolean(b.reviewStatus))) * dir;
          }
          if (key === 'dateReceived' || key === 'dueDate') {
            const aDate = parseDateValue(a[key]);
            const bDate = parseDateValue(b[key]);
            if (aDate !== null && bDate !== null && aDate !== bDate) return (aDate - bDate) * dir;
          }
          return String(a[key] || '').localeCompare(String(b[key] || ''), undefined, { sensitivity: 'base', numeric: true }) * dir;
        });
      }

      async function loadState() {
        setBusy(true, 'Refreshing schedule...');
        try {
          const data = await callServer('getDashboardState');
          applyState(data);
          setConnectionState();
          toast(backend() ? 'Schedule refreshed.' : 'Preview mode: dashboard is not connected to Google yet.');
        } catch (error) {
          setConnectionState(error.message);
          toast('Could not refresh: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      async function digestNow() {
        setBusy(true, 'Digesting new traveler photos...');
        try {
          const result = await callServer('digestPhotosNow');
          applyState(result.state);
          const count = (result.appended || []).length;
          const skipped = (result.skipped || []).length;
          const failed = (result.failed || []).length;
          const firstFailure = failed ? ` First failure: ${result.failed[0].name}: ${result.failed[0].error}` : '';
          toast(backend() ? `Digest complete: ${count} added, ${skipped} skipped${failed ? `, ${failed} failed.` : '.'}${firstFailure}` : 'Preview mode cannot digest Drive photos. Deploy as Apps Script to connect this button.');
        } catch (error) {
          toast('Digest failed: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      async function importOpenOrders() {
        setBusy(true, 'Syncing weekly open orders...');
        try {
          const result = await callServer('importOpenOrderReports');
          applyState(result.state);
          const added = (result.imported || []).reduce((sum, file) => sum + Number(file.rows || 0), 0);
          const fileCount = (result.imported || []).length;
          const updated = Number(result.updated || 0);
          const removed = Number(result.removed || 0);
          const skipped = (result.skipped || []).length;
          const failed = (result.failed || []).length;
          const firstFailure = failed ? ` First failure: ${result.failed[0].name}: ${result.failed[0].error}` : '';
          toast(
            backend()
              ? `Open-order sync complete: ${added} added, ${updated} updated, ${removed} removed${skipped ? `, ${skipped} skipped` : ''}${failed ? `, ${failed} failed.` : '.'}${firstFailure}`
              : 'Preview mode cannot sync weekly open orders. Deploy as Apps Script to connect this button.'
          );
        } catch (error) {
          toast('Open-order import failed: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      async function repairReviewRows() {
        setBusy(true, 'Repairing Needs Review rows with Gemini...');
        try {
          const result = await callServer('repairNeedsReview');
          applyState(result.state);
          const repaired = (result.repaired || []).length;
          const failed = (result.failed || []).length;
          const firstFailure = failed ? ` First failure: row ${result.failed[0].rowNumber}: ${result.failed[0].error}` : '';
          toast(`Repair complete: ${repaired} updated${failed ? `, ${failed} failed.` : '.'}${firstFailure}`);
        } catch (error) {
          toast('Repair failed: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      async function sendToShop() {
        const selectedCount = state.rows.filter(row => row.status === 'Run Tomorrow' || row.status === 'Hot List').length;
        if (!selectedCount) {
          toast('Nothing selected for the floor schedule yet.');
          return;
        }
        setBusy(true, `Preparing ${selectedCount} rows for print preview...`);
        try {
          const result = await callServer('previewShopSchedule');
          applyState(result.state);
          renderPrintTemplate(result);
          openPrintOverlay();
          finalizeBtn.disabled = false;
          toast(`Print preview ready: ${result.sentCount} rows. Print first, then finalize when the schedule is truly done.`);
          if (result.floorUrl) sheetLink.href = result.floorUrl;
        } catch (error) {
          toast('Could not prepare shop preview: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      async function finalizeBatch() {
        const selectedCount = state.rows.filter(row => row.status === 'Run Tomorrow' || row.status === 'Hot List').length;
        if (!selectedCount) {
          toast('Nothing selected to finalize.');
          return;
        }
        if (!confirm(`Finalize ${selectedCount} rows, archive the floor schedule, and remove them from the active queue?`)) return;
        setBusy(true, `Finalizing ${selectedCount} rows...`);
        try {
          const result = await callServer('completeSendToShop');
          applyState(result.state);
          closePrintOverlay();
          finalizeBtn.disabled = true;
          toast(`Batch finalized: ${result.sentCount} rows archived and removed from active schedule.`);
          if (result.floorUrl) sheetLink.href = result.floorUrl;
        } catch (error) {
          toast('Could not finalize batch: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      async function installAutomations() {
        setBusy(true, 'Turning on automatic open-order sync and photo digest...');
        try {
          const message = await callServer('installTriggers');
          toast(backend() ? message : 'Preview mode cannot install auto import. Open the deployed Apps Script web app.');
        } catch (error) {
          toast('Could not install auto import: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      function renderPrintTemplate(result) {
        const rows = result.shopRows || [];
        const groups = groupByColor(rows);
        printPage.innerHTML = `
          <section class="printHead">
            <div>
              <h2 class="printTitle">Creative Coatings Floor Schedule</h2>
              <div class="subtitle">Sorted by color, hot priority, then customer</div>
            </div>
            <div class="printMeta">
              <div>${escapeHtml(result.timestamp || '')}</div>
              <div>${escapeHtml(result.batchId || '')}</div>
              <div>${rows.length} jobs</div>
            </div>
          </section>
          ${groups.map(colorGroupTemplate).join('')}
        `;
      }

      function groupByColor(rows) {
        const map = new Map();
        rows.forEach(row => {
          const color = row.powder || 'Unlisted Color';
          if (!map.has(color)) map.set(color, []);
          map.get(color).push(row);
        });
        return [...map.entries()].map(([color, rows]) => ({ color, rows }));
      }

      function colorGroupTemplate(group) {
        const hotCount = group.rows.filter(row => row.status === 'Hot List').length;
        return `
          <section class="colorGroup">
            <div class="colorHeader">
              <span>${escapeHtml(group.color)}</span>
              <span>${group.rows.length} jobs${hotCount ? ` / ${hotCount} hot` : ''}</span>
            </div>
            <table class="printRows">
              <colgroup>
                <col class="paint">
                <col class="hot">
                <col class="customer">
                <col class="part">
                <col class="qty">
              </colgroup>
              <thead>
                <tr>
                  <th>Paint Color</th>
                  <th>Hot</th>
                  <th>Customer</th>
                  <th>Part Number</th>
                  <th>Qty</th>
                </tr>
              </thead>
              <tbody>
                ${group.rows.map(printRowTemplate).join('')}
              </tbody>
            </table>
          </section>
        `;
      }

      function printRowTemplate(row) {
        const hot = row.status === 'Hot List' ? 'HOT' : '';
        return `
          <tr class="${hot ? 'hotPrint' : ''}">
            <td>${escapeHtml(row.powder)}</td>
            <td>${hot}</td>
            <td>${escapeHtml(row.customer)}</td>
            <td>${escapeHtml(row.partNumber)}</td>
            <td>${escapeHtml(row.quantity)}</td>
          </tr>
        `;
      }

      function openPrintOverlay() {
        printOverlay.classList.add('open');
        printOverlay.setAttribute('aria-hidden', 'false');
      }

      function closePrintOverlay() {
        printOverlay.classList.remove('open');
        printOverlay.setAttribute('aria-hidden', 'true');
      }

      async function changeStatus(rowNumber, status) {
        setBusy(true, 'Updating row...');
        try {
          const data = await callServer('updateScheduleStatus', rowNumber, status);
          applyState(data);
          toast('Status updated.');
        } catch (error) {
          toast('Could not update status: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      async function markRowReviewed(rowNumber) {
        setBusy(true, 'Clearing review flag...');
        try {
          const data = await callServer('markReviewed', rowNumber);
          applyState(data);
          toast('Review flag cleared.');
        } catch (error) {
          toast('Could not clear review: ' + error.message);
        } finally {
          setBusy(false);
        }
      }

      function applyState(data) {
        state.rows = data.rows || [];
        sheetLink.href = data.floorUrl || data.masterUrl || '#';
        $('#countTotal').textContent = data.counts?.total || 0;
        $('#countHot').textContent = data.counts?.hot || 0;
        $('#countTomorrow').textContent = data.counts?.tomorrow || 0;
        $('#countHold').textContent = data.counts?.hold || 0;
        $('#countReview').textContent = data.counts?.review || 0;
        shopBtn.textContent = `Complete Send to Shop (${(data.counts?.hot || 0) + (data.counts?.tomorrow || 0)})`;
        setReaderState(data.readerStatus);
        renderRows();
      }

      function setConnectionState(errorText) {
        const connected = Boolean(backend()) && !errorText;
        connectionBadge.classList.toggle('connected', connected);
        connectionBadge.classList.toggle('disconnected', !connected);
        connectionBadge.textContent = connected
          ? 'Connected to Google Apps Script'
          : (errorText ? `Connection error: ${errorText}` : 'Preview mode: not connected to Google');
      }

      function setReaderState(readerStatus) {
        const reader = readerStatus?.reader || 'Drive OCR fallback';
        const model = readerStatus?.model || '';
        const activeVision = reader === 'Gemini Vision';
        readerBadge.classList.toggle('connected', activeVision);
        readerBadge.classList.toggle('disconnected', !activeVision);
        readerBadge.textContent = activeVision
          ? `Reader: ${reader} (${model})`
          : `Reader: ${reader}${model ? ` (${model} ready)` : ''}`;
      }

      function renderRows() {
        const query = state.search.toLowerCase();
        const filtered = state.rows.filter(row => {
          const matchesFilter =
            state.filter === 'all' ||
            row.status === state.filter ||
            (state.filter === 'review' && row.reviewStatus);
          const haystack = [row.customer, row.partNumber, row.powder, row.maskedStatus].join(' ').toLowerCase();
          return matchesFilter && haystack.includes(query);
        });
        const sorted = sortRows(filtered);
        const hasReviewActions = sorted.some(row => row.reviewStatus);

        rowsEl.innerHTML = sorted.map(rowTemplate).join('');
        emptyEl.hidden = sorted.length > 0;
        document.querySelector('.tableWrap table').classList.toggle('hideActions', !hasReviewActions);
        rowsEl.querySelectorAll('select[data-row]').forEach(select => {
          select.addEventListener('change', event => changeStatus(event.target.dataset.row, event.target.value));
        });
        rowsEl.querySelectorAll('button[data-reviewed-row]').forEach(button => {
          button.addEventListener('click', event => markRowReviewed(event.currentTarget.dataset.reviewedRow));
        });
        syncSortHeaders();
      }

      function rowTemplate(row) {
        const trClass = row.status === 'Hot List' ? 'hot' : row.status === 'Run Tomorrow' ? 'tomorrow' : '';
        const reviewClass = row.reviewStatus ? 'review' : '';
        return `
          <tr class="${trClass} ${reviewClass}">
            <td>
              <select class="status" data-row="${escapeHtml(row.rowNumber)}">
                ${statusOption(row.status, 'On Hold')}
                ${statusOption(row.status, 'Run Tomorrow')}
                ${statusOption(row.status, 'Hot List')}
              </select>
            </td>
            <td>${cellText(row.customer)}</td>
            <td>${cellText(row.partNumber)}</td>
            <td>${cellText(row.quantity)}</td>
            <td>${cellText(row.powder)}</td>
            <td>${cellText(row.dateReceived)}</td>
            <td>${cellText(row.dueDate)}</td>
            <td>${row.maskedStatus ? '<span class="pill">Masked</span>' : ''}</td>
            <td>${row.reviewStatus ? '<span class="pill review">Review</span>' : ''}</td>
            <td>${photoLink(row)}</td>
            <td>
              <div class="rowActions">
                ${row.reviewStatus ? `<button class="iconBtn" data-reviewed-row="${escapeHtml(row.rowNumber)}" type="button" title="Mark reviewed">OK</button>` : ''}
              </div>
            </td>
          </tr>
        `;
      }

      function cellText(value) {
        return `<span class="cellText">${escapeHtml(value)}</span>`;
      }

      function photoLink(row) {
        if (!row.sourcePhotoUrl) return '';
        const label = row.sourcePhoto || 'Photo';
        return `<a class="pill" href="${escapeHtml(row.sourcePhotoUrl)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`;
      }

      function syncSortHeaders() {
        document.querySelectorAll('.headBtn').forEach(button => {
          const active = button.dataset.sortKey === state.sortKey;
          button.dataset.active = active ? 'true' : 'false';
          const mark = button.querySelector('.sortMark');
          if (!mark) return;
          mark.textContent = active ? (state.sortDir === 'asc' ? '▲' : '▼') : '';
        });
      }

      function toggleSort(sortKey) {
        if (state.sortKey === sortKey) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = sortKey;
          state.sortDir = 'asc';
        }
        renderRows();
      }

      function toggleToolsMenu(forceOpen) {
        const open = typeof forceOpen === 'boolean' ? forceOpen : !toolsMenu.classList.contains('open');
        toolsMenu.classList.toggle('open', open);
        toolsBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      function statusOption(current, value) {
        return `<option value="${value}" ${current === value ? 'selected' : ''}>${value}</option>`;
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function setBusy(busy, message) {
        state.busy = busy;
        const canFinalize = !finalizeBtn.disabled;
        importReportsBtn.disabled = busy;
        digestBtn.disabled = busy;
        toolsBtn.disabled = busy;
        repairBtn.disabled = busy;
        shopBtn.disabled = busy;
        finalizeBtn.disabled = busy || !canFinalize;
        setupBtn.disabled = busy;
        refreshBtn.disabled = busy;
        if (message) toast(message);
      }

      function toast(message) {
        toastEl.textContent = message || '';
      }

      importReportsBtn.addEventListener('click', importOpenOrders);
      digestBtn.addEventListener('click', digestNow);
      toolsBtn.addEventListener('click', () => toggleToolsMenu());
      repairBtn.addEventListener('click', () => {
        toggleToolsMenu(false);
        repairReviewRows();
      });
      shopBtn.addEventListener('click', sendToShop);
      finalizeBtn.addEventListener('click', finalizeBatch);
      setupBtn.addEventListener('click', installAutomations);
      refreshBtn.addEventListener('click', loadState);
      $('#printBtn').addEventListener('click', () => window.print());
      window.addEventListener('afterprint', closePrintOverlay);
      $('#closePrintBtn').addEventListener('click', closePrintOverlay);
      document.querySelectorAll('.headBtn').forEach(button => {
        button.addEventListener('click', () => toggleSort(button.dataset.sortKey));
      });
      $('#search').addEventListener('input', event => {
        state.search = event.target.value;
        renderRows();
      });
      $('#search').setAttribute('autocomplete', 'off');
      document.addEventListener('click', event => {
        if (!event.target.closest('.menuWrap')) toggleToolsMenu(false);
      });
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(item => item.classList.remove('active'));
          tab.classList.add('active');
          state.filter = tab.dataset.filter;
          renderRows();
        });
      });

      loadState();
    </script>
  </body>
</html>
